<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vinash · security notes & writeups</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            background: #0a0c10;
            color: #c0c0c0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========= HACKER NAVBAR (full-width black) ========= */
        .navbar {
            background: #050608;
            border-bottom: 2px solid #8bc34a;
            height: 64px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            width: 100%;
            box-shadow: 0 0 5px rgba(0, 255, 65, 0.2);
        }
        .navbar-inner {
            max-width: 1400px;
            width: 100%;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            align-items: center;
        }
        .navbar-main {
            grid-column: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 2rem;
            padding-right: 2rem;
        }
        .nav-name {
            font-weight: 700;
            font-size: 1.5rem;
            color: #8bc34a;
            letter-spacing: -0.2px;
            text-shadow: 0 0 3px #8bc34a;
            background: none;
        }
        .motto {
            font-size: 0.85rem;
            color: #8bc34a;        /* softer, more natural green */
            border-left: 2px solid #8bc34a;
            padding-left: 12px;
            font-style: italic;
            font-family: monospace;
        }

        /* ========= MAIN LAYOUT ========= */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 0 2rem;
            flex: 1;
            overflow: hidden;
            gap: 1rem;
        }

        /* LEFT SIDEBAR (dark with subtle border) */
        .sidebar-left {
            background: #0f1115;
            border-right: 1px solid #1f2329;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.2rem 0.8rem;
            border-radius: 12px 0 0 12px;
        }
        .tree-header {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #8bc34a;
            margin-bottom: 1rem;
            padding-left: 8px;
            letter-spacing: 1px;
            border-left: 2px solid #8bc34a;
        }
        .file-tree {
            font-size: 0.8rem;
            list-style: none;
            padding-left: 0;
        }
        .tree-node {
            margin: 2px 0;
            cursor: pointer;
        }
        .tree-node-content {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 6px;
            transition: background 0.15s, text-shadow 0.1s;
            color: #b0b0b0;
            font-weight: 450;
            word-break: break-word;
        }
        .tree-node-content:hover {
            background: #1a2416;
            color: #7fdb6a;
            text-shadow: 0 0 2px #7fdb6a;
        }
        .tree-node-content.active {
            background: #1a2416;
            font-weight: 500;
            color: #7fdb6a;
            border-left: 2px solid #7fdb6a;
        }
        .folder-icon, .file-icon {
            font-size: 1rem;
            width: 20px;
            flex-shrink: 0;
        }
        .node-label {
            flex: 1;
            word-break: break-word;
        }
        .children-wrapper {
            padding-left: 1.6rem;
            list-style: none;
            display: none;
        }
        .children-wrapper.expanded {
            display: block;
        }
        .empty-folder {
            font-size: 0.7rem;
            color: #5a6e7a;
            padding: 4px 0 4px 28px;
            font-style: italic;
        }

        /* MAIN CONTENT (black card with neon border) */
        /* MAIN CONTENT – READABLE & CLEAN */
        .main-content {
            background: #0c0e12;
            border-radius: 16px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
            border: 1px solid #1f2329;
            overflow-y: auto;
            padding: 2rem;
        }
        .markdown-body {
            max-width: 880px;
            margin: 0 auto;
            line-height: 1.7;
            font-size: 16px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #d0d0d0;
        }
        .markdown-body h1 {
            font-size: 2em;
            margin: 0.67em 0 0.5em;
            font-weight: 800;
            border-bottom: 1px solid #2c3e50;
            padding-bottom: 0.3em;
            color: #ffffff;
        }
        .markdown-body h2 {
            font-size: 1.5em;
            margin: 1em 0 0.5em;
            font-weight: 700;
            border-bottom: 1px solid #2c3e50;
            padding-bottom: 0.3em;
            color: #ffffff;
        }
        .markdown-body h3 {
            font-size: 1.25em;
            margin: 0.8em 0 0.4em;
            font-weight: 700;
            color: #f0f0f0;
        }
        .markdown-body p {
            margin: 1em 0;
        }
        .markdown-body a {
            color: #7fdb6a;
            text-decoration: none;
            border-bottom: 1px dashed #7fdb6a;
        }
        .markdown-body a:hover {
            text-shadow: 0 0 2px #7fdb6a;
        }
        .markdown-body img {
            max-width: 100%;
            height: auto;
            margin: 1.2em 0;
            border-radius: 8px;
            border: 1px solid #2c3e50;
        }
        .markdown-body pre {
            background: #050608;
            border-radius: 12px;
            padding: 1em;
            overflow-x: auto;
            margin: 1.2em 0;
            border: 1px solid #2c3e50;
        }
        .markdown-body code {
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.9em;
        }
        /* inline code – muted green, less flashy */
        .markdown-body code:not(pre code) {
            background-color: #1a262f;   /* dark blue‑grey background */
            padding: 0.2em 0.4em;
            border-radius: 6px;
            color: #8eb758;              /* soft blue, easy on eyes */
            font-weight: normal;
        }
        .markdown-body ul, .markdown-body ol {
            margin: 0.8em 0;
            padding-left: 2em;
        }
        .markdown-body li {
            margin: 0.3em 0;
        }
        .markdown-body blockquote {
            border-left: 4px solid #7fdb6a;
            margin: 1em 0;
            padding: 0.5em 1em;
            background: #111317;
            border-radius: 0 8px 8px 0;
            color: #b0b0b0;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            background: #0f1115;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #2c3e50;
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background: #1a1e26;
            font-weight: 600;
            color: #9ccc7c;
        }
        .loading-placeholder {
            text-align: center;
            padding: 3rem;
            color: #6c7e8e;
        }

        /* RIGHT SIDEBAR TOC (hacker style) */
        .sidebar-right {
            background: #0f1115;
            border-left: 1px solid #1f2329;
            overflow-y: auto;
            padding: 1.5rem 1rem;
            border-radius: 0 12px 12px 0;
        }
        .toc-header {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #8bc34a;
            margin-bottom: 1.2rem;
            border-bottom: 1px solid #2c3e50;
            padding-bottom: 4px;
            letter-spacing: 1px;
        }
        .toc-list {
            list-style: none;
            padding-left: 0;
        }
        .toc-item {
            margin: 8px 0;
            font-size: 0.75rem;
        }
        .toc-link {
            text-decoration: none;
            color: #b0b0b0;
            display: block;
            padding: 4px 6px;
            border-radius: 6px;
            font-family: monospace;
        }
        .toc-link:hover {
            background: #1a2416;
            color: #7fdb6a;
        }
        .toc-link.h2 {
            padding-left: 12px;
        }
        .toc-link.h3 {
            padding-left: 24px;
            font-size: 0.7rem;
        }
        .no-toc {
            font-size: 0.75rem;
            color: #5a6e7a;
            text-align: center;
            margin-top: 2rem;
        }

        /* custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0c10;
        }
        ::-webkit-scrollbar-thumb {
            background: #2c3e50;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00ff41;
        }

        @media (max-width: 800px) {
            .navbar-inner, .app-container {
                grid-template-columns: 220px 1fr 220px;
                padding: 0 1rem;
            }
            .navbar-main {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
        @media (max-width: 680px) {
            .sidebar-right {
                display: none;
            }
            .navbar-inner, .app-container {
                grid-template-columns: 200px 1fr;
            }
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="navbar-inner">
        <div class="navbar-main">
            <div class="nav-name">vinash</div>
            <div class="motto">resistance is futile // pwned</div>
        </div>
    </div>
</div>

<div class="app-container">
    <div class="sidebar-left">
        <div class="tree-header">EXPLORER</div>
        <div id="fileTreeContainer">Loading repository...</div>
    </div>

    <div class="main-content">
        <div id="markdownContainer" class="markdown-body">
            <div class="loading-placeholder">✨ Select a note from the explorer</div>
        </div>
    </div>

    <div class="sidebar-right">
        <div class="toc-header">ON THIS PAGE</div>
        <div id="tocContainer"><div class="no-toc">—</div></div>
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const GITHUB_OWNER = "97-vinash";        // <-- YOUR GITHUB USERNAME
    const GITHUB_REPO = "security-research";       // <-- YOUR REPOSITORY NAME
    const GITHUB_BRANCH = "main";
    // =======================================================

    let currentFilePath = null;
    let expandedFolders = new Set();
    let folderCache = new Map();

    const converter = new showdown.Converter({
        simplifiedAutoLink: true,
        strikethrough: true,
        tables: true,
        tasklists: true,
        openLinksInNewWindow: false,
        backslashEscapesHTMLTags: true
    });

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function slugify(text) {
        let s = String(text || '');
        if (!s.trim()) return 'heading-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
        return s.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/--+/g, '-').replace(/^-+|-+$/g, '');
    }

    function fixImagePaths(html, mdFilePath) {
        const folderPath = mdFilePath.substring(0, mdFilePath.lastIndexOf('/'));
        const rawBase = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/`;
        return html.replace(/<img\s+src="([^"]+)"([^>]*)>/gi, (match, src, rest) => {
            let newSrc = src;
            if (src.startsWith('/')) {
                newSrc = rawBase + src.slice(1);
            } else if (!src.startsWith('http://') && !src.startsWith('https://')) {
                newSrc = rawBase + (folderPath ? folderPath + '/' : '') + src;
            }
            return `<img src="${newSrc}"${rest} loading="lazy">`;
        });
    }

    async function fetchMarkdownContent(fileRelPath) {
        const rawUrl = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${fileRelPath}`;
        const res = await fetch(rawUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${fileRelPath} not found`);
        return await res.text();
    }

    async function renderMarkdown(filePath) {
        if (!filePath) return;
        const mdContainer = document.getElementById('markdownContainer');
        const tocContainer = document.getElementById('tocContainer');
        mdContainer.innerHTML = `<div class="loading-placeholder">⏳ loading ${escapeHtml(filePath)}...</div>`;
        tocContainer.innerHTML = `<div class="no-toc">—</div>`;

        try {
            let rawMd = await fetchMarkdownContent(filePath);
            if (typeof rawMd !== 'string') rawMd = String(rawMd || '');

            let dirtyHtml = converter.makeHtml(rawMd);
            dirtyHtml = fixImagePaths(dirtyHtml, filePath);

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = dirtyHtml;
            const tocItems = [];
            const headings = tempDiv.querySelectorAll('h1, h2, h3');
            headings.forEach(heading => {
                const level = parseInt(heading.tagName[1]);
                let text = heading.textContent || 'heading';
                const id = slugify(text);
                heading.id = id;
                tocItems.push({ level, text, id });
            });

            const codeBlocks = tempDiv.querySelectorAll('pre code');
            codeBlocks.forEach(block => hljs.highlightElement(block));
            dirtyHtml = tempDiv.innerHTML;

            let cleanHtml = DOMPurify.sanitize(dirtyHtml);

            // If the current file is home.md, remove all <hr> elements (horizontal rules)
            if (filePath === 'home.md') {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = cleanHtml;
                tempDiv.querySelectorAll('hr').forEach(hr => hr.remove());
                cleanHtml = tempDiv.innerHTML;
            }

            mdContainer.innerHTML = cleanHtml;

            if (tocItems.length === 0) {
                tocContainer.innerHTML = `<div class="no-toc">📄 no headings</div>`;
            } else {
                tocContainer.innerHTML = `<ul class="toc-list">
                    ${tocItems.map(item => {
                        const levelClass = item.level === 2 ? 'h2' : (item.level === 3 ? 'h3' : '');
                        return `<li class="toc-item"><a class="toc-link ${levelClass}" href="#${item.id}">${escapeHtml(item.text)}</a></li>`;
                    }).join('')}
                </ul>`;
                document.querySelectorAll('#tocContainer .toc-link').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const hash = link.getAttribute('href');
                        if (hash && hash.startsWith('#')) {
                            const el = document.getElementById(hash.slice(1));
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            history.pushState(null, null, hash);
                        }
                    });
                });
            }
            if (window.location.hash) {
                const id = window.location.hash.slice(1);
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        } catch (err) {
            console.error(err);
            mdContainer.innerHTML = `<div class="loading-placeholder" style="color:#ff5555;">
                ❌ Failed to load or parse ${escapeHtml(filePath)}<br>
                <span style="font-size:0.8rem;">${escapeHtml(err.message)}</span>
            </div>`;
            tocContainer.innerHTML = `<div class="no-toc">⚠️ error</div>`;
        }
    }

    async function fetchGitHubContents(subpath = "") {
        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${subpath}?ref=${GITHUB_BRANCH}`;
        const res = await fetch(url);
        if (!res.ok) {
            if (res.status === 404) return [];
            throw new Error(`GitHub API error ${res.status}: ${res.statusText}`);
        }
        const data = await res.json();
        if (!Array.isArray(data)) return [];
        return data.map(item => ({
            name: item.name,
            path: item.path,
            type: item.type,
        }));
    }

    async function getDirectoryChildren(folderPath) {
        if (folderCache.has(folderPath)) return folderCache.get(folderPath);
        const items = await fetchGitHubContents(folderPath);
        const folders = items.filter(i => i.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));
        const mdFiles = items.filter(i => i.type === 'file' && i.name.endsWith('.md')).sort((a,b) => a.name.localeCompare(b.name));
        const merged = [...folders, ...mdFiles];
        folderCache.set(folderPath, merged);
        return merged;
    }

    async function renderTreeNode(node) {
        const li = document.createElement('li');
        li.className = 'tree-node';
        const isDir = node.type === 'dir';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'tree-node-content';
        if (currentFilePath === node.path && !isDir) contentDiv.classList.add('active');
        contentDiv.innerHTML = `<span class="${isDir ? 'folder-icon' : 'file-icon'}">${isDir ? '📁' : '📄'}</span>
                                <span class="node-label">${escapeHtml(node.name)}</span>`;
        const childrenWrapper = document.createElement('ul');
        childrenWrapper.className = 'children-wrapper';
        if (isDir && expandedFolders.has(node.path)) childrenWrapper.classList.add('expanded');

        contentDiv.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (isDir) {
                if (expandedFolders.has(node.path)) {
                    expandedFolders.delete(node.path);
                    childrenWrapper.classList.remove('expanded');
                } else {
                    expandedFolders.add(node.path);
                    childrenWrapper.classList.add('expanded');
                    if (childrenWrapper.children.length === 0) {
                        const childItems = await getDirectoryChildren(node.path);
                        if (childItems.length === 0) {
                            childrenWrapper.innerHTML = '<div class="empty-folder">empty folder</div>';
                        } else {
                            for (const child of childItems) {
                                const childLi = await renderTreeNode(child);
                                childrenWrapper.appendChild(childLi);
                            }
                        }
                    }
                }
            } else {
                if (node.name.endsWith('.md')) loadAndSelectFile(node.path);
            }
        });

        li.appendChild(contentDiv);
        if (isDir) li.appendChild(childrenWrapper);
        return li;
    }

    async function buildFileTreeUI() {
        const container = document.getElementById('fileTreeContainer');
        try {
            const rootItems = await fetchGitHubContents("");
            const folders = rootItems.filter(i => i.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));
            const mdFiles = rootItems.filter(i => i.type === 'file' && i.name.endsWith('.md')).sort((a,b) => a.name.localeCompare(b.name));
            const rootNodes = [...folders, ...mdFiles];
            folderCache.set('', rootNodes);

            const ul = document.createElement('ul');
            ul.className = 'file-tree';
            for (const node of rootNodes) {
                const li = await renderTreeNode(node);
                ul.appendChild(li);
            }
            container.innerHTML = '';
            container.appendChild(ul);
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div style="color:#ff5555; padding:1rem;">
                ⚠️ Failed to load repository structure.<br>
                ${escapeHtml(err.message)}<br><br>
                Make sure the repository is public and the owner/repo names are correct.
            </div>`;
        }
    }

    async function loadAndSelectFile(fileRelPath) {
        if (!fileRelPath || !fileRelPath.endsWith('.md')) return;
        currentFilePath = fileRelPath;
        await renderMarkdown(fileRelPath);
        // highlight active file in tree
        document.querySelectorAll('.tree-node-content').forEach(el => el.classList.remove('active'));
        const allItems = document.querySelectorAll('.tree-node-content');
        for (const div of allItems) {
            const label = div.querySelector('.node-label');
            if (label && fileRelPath.endsWith(label.innerText) && !div.querySelector('.folder-icon')) {
                div.classList.add('active');
                break;
            }
        }
        window.location.hash = `#/file/${encodeURIComponent(fileRelPath)}`;
    }

    async function init() {
        await buildFileTreeUI();
        const hash = window.location.hash;
        if (hash && hash.startsWith('#/file/')) {
            const path = decodeURIComponent(hash.slice(7));
            if (path && path.endsWith('.md')) await loadAndSelectFile(path);
        } else {
            try { await loadAndSelectFile('index.md'); } catch(e) { /* no index.md */ }
        }
    }

    window.addEventListener('hashchange', async () => {
        if (window.location.hash.startsWith('#/file/')) {
            const path = decodeURIComponent(window.location.hash.slice(7));
            if (path !== currentFilePath) await loadAndSelectFile(path);
        }
    });

    init();
</script>
</body>
</html>
